services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - '3000'
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    # `env_file` injects these into the container's own process environment directly — unlike
    # `${VAR}` interpolation in this file, it doesn't depend on where `docker compose` is
    # invoked from or a second `.env` living next to this compose file.
    env_file:
      - ../.env
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  proxy:
    image: caddy:2.9-alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  mysql-data:
  caddy-data:
  caddy-config:
